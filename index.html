<title>MiRadio</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Figtree:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1923;--card:#18242f;--border:rgba(255,255,255,0.07);--text:#f0ece4;--muted:rgba(240,236,228,0.38);--green:#2ecc71;--amber:#f39c12;--red:#e74c3c;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:16px 14px 32px;font-family:'Figtree',sans-serif;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:32px 32px;}
.topbar{width:100%;max-width:420px;display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;padding:0 2px;animation:up .35s both ease;}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--text);letter-spacing:.06em;}
.topbar-sub{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
#installBanner{display:none;width:100%;max-width:420px;background:rgba(232,146,10,0.1);border:1px solid rgba(232,146,10,0.3);border-radius:10px;padding:10px 14px;margin-bottom:12px;align-items:center;gap:10px;}
#installBanner.show{display:flex;}
.install-ico{font-size:1.4rem;flex-shrink:0;}
.install-txt{flex:1;}
.install-txt strong{display:block;font-size:.78rem;color:var(--text);letter-spacing:.02em;}
.install-txt span{font-size:.62rem;color:var(--muted);letter-spacing:.04em;}
.install-btn{background:rgba(232,146,10,0.85);border:none;border-radius:6px;color:#0f1923;font-family:'Figtree',sans-serif;font-weight:600;font-size:.7rem;padding:7px 12px;cursor:pointer;letter-spacing:.04em;flex-shrink:0;}
.install-dismiss{background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:0 4px;flex-shrink:0;}
.offline-bar{display:none;width:100%;max-width:420px;background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.3);border-radius:8px;padding:8px 14px;margin-bottom:12px;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--red);text-align:center;}
.offline-bar.show{display:block;}
.now-bar{width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:12px;display:flex;align-items:center;gap:14px;animation:up .35s .06s both ease;}
.now-logo{width:52px;height:52px;border-radius:10px;object-fit:contain;background:rgba(255,255,255,.05);flex-shrink:0;transition:opacity .3s;}
.now-logo.hidden{opacity:0;}
.now-info{flex:1;overflow:hidden;}
.now-freq{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--text);letter-spacing:.05em;line-height:1;}
.now-name{font-size:.68rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.now-status{display:flex;align-items:center;gap:6px;margin-top:8px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s,box-shadow .3s;}
.dot.on{background:var(--green);box-shadow:0 0 0 3px rgba(46,204,113,.2);animation:pulse 2s infinite;}
.dot.buf{background:var(--amber);animation:blink .5s infinite;}
.dot.err{background:var(--red);}
.status-txt{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
.mini-wave{display:flex;align-items:center;gap:2px;height:20px;margin-left:4px;}
.mw-bar{width:3px;border-radius:2px;background:rgba(255,255,255,.12);height:3px;transition:height .1s,background .15s;}
.mw-bar.on{background:var(--green);}
.cards{width:100%;max-width:420px;display:flex;flex-direction:column;gap:8px;margin-bottom:12px;animation:up .35s .12s both ease;}
.s-card{background:var(--card);border:1px solid var(--border);border-radius:14px;display:flex;align-items:stretch;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s;width:100%;text-align:left;position:relative;}
.s-card:active{transform:scale(.98);}
.s-card.active{border-color:rgba(255,255,255,.18);}
.s-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent-color);border-radius:14px 0 0 14px;opacity:0;transition:opacity .3s;}
.s-card.active::before{opacity:1;}
.s-logo-wrap{width:72px;display:flex;align-items:center;justify-content:center;padding:12px 8px;flex-shrink:0;}
.s-logo{max-width:56px;max-height:48px;object-fit:contain;border-radius:6px;}
.s-body{flex:1;padding:12px 12px 12px 4px;display:flex;flex-direction:column;justify-content:center;overflow:hidden;}
.s-freq{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.04em;color:var(--text);line-height:1;}
.s-card.active .s-freq{color:var(--accent-color);}
.s-name{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.s-right{display:flex;align-items:center;padding-right:14px;}
.s-chevron{font-size:.75rem;color:var(--muted);opacity:.3;transition:opacity .2s,color .2s;}
.s-card.active .s-chevron{opacity:1;color:var(--accent-color);}
.controls-strip{width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:10px;animation:up .35s .18s both ease;}
.btn-play{width:54px;height:54px;border-radius:50%;background:var(--text);color:var(--bg);border:none;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-family:inherit;}
.btn-play:active{transform:scale(.92);}
.btn-play.playing{background:var(--green);}
.btn-skip{background:none;border:none;cursor:pointer;color:var(--muted);font-size:.95rem;padding:8px;transition:color .2s;font-family:inherit;}
.btn-skip:active{color:var(--text);}
.vol-wrap{flex:1;display:flex;align-items:center;gap:8px;margin-left:2px;}
.vol-ico{font-size:.75rem;color:var(--muted);}
input[type=range]{flex:1;-webkit-appearance:none;height:3px;background:rgba(255,255,255,.12);border-radius:2px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--text);cursor:grab;}
.footer{margin-top:14px;font-size:.55rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.15);text-align:center;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(46,204,113,.2)}50%{box-shadow:0 0 0 5px rgba(46,204,113,.07)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">MiRadio</span>
  <span class="topbar-sub">streaming &middot; en vivo</span>
</div>

<div id="installBanner">
  <span class="install-ico">&#128251;</span>
  <div class="install-txt">
    <strong>Instalar MiRadio</strong>
    <span>Agregar a pantalla de inicio</span>
  </div>
  <button class="install-btn" id="installBtn">Instalar</button>
  <button class="install-dismiss" id="dismissBtn">&#10005;</button>
</div>

<div class="offline-bar" id="offlineBar">&#9888; sin conexi&oacute;n</div>

<div class="now-bar">
  <img class="now-logo hidden" id="nowLogo" src="" alt="">
  <div class="now-info">
    <div class="now-freq" id="nowFreq">&#8212; &#8212;</div>
    <div class="now-name" id="nowName">seleccion&aacute; una emisora</div>
    <div class="now-status">
      <div class="dot" id="dot"></div>
      <span class="status-txt" id="statusTxt">en espera</span>
      <div class="mini-wave" id="miniWave"></div>
    </div>
  </div>
</div>

<div class="cards" id="cardList"></div>

<div class="controls-strip">
  <button class="btn-play" id="playBtn">&#9654;</button>
  <button class="btn-skip" id="prevBtn">&#9668;&#9668;</button>
  <button class="btn-skip" id="nextBtn">&#9658;&#9658;</button>
  <div class="vol-wrap">
    <span class="vol-ico">&#9835;</span>
    <input type="range" id="vol" min="0" max="100" value="80">
  </div>
</div>

<div class="footer">Luciano Lamaita &middot; Saladillo 2025</div>

const aud=document.getElementById('aud'),
      playBtn=document.getElementById('playBtn'),
      prevBtn=document.getElementById('prevBtn'),
      nextBtn=document.getElementById('nextBtn'),
      volEl=document.getElementById('vol'),
      dotEl=document.getElementById('dot'),
      statusEl=document.getElementById('statusTxt'),
      nowFreqEl=document.getElementById('nowFreq'),
      nowNameEl=document.getElementById('nowName'),
      nowLogoEl=document.getElementById('nowLogo'),
      miniWave=document.getElementById('miniWave'),
      cardList=document.getElementById('cardList'),
      offlineBar=document.getElementById('offlineBar'),
      installBanner=document.getElementById('installBanner'),
      installBtn=document.getElementById('installBtn'),
      dismissBtn=document.getElementById('dismissBtn');

const MW=18;
for(let i=0;i<MW;i++){const b=document.createElement('div');b.className='mw-bar';miniWave.appendChild(b);}
const wBars=miniWave.querySelectorAll('.mw-bar');
const wPeaks=Array.from({length:MW},()=>4+Math.random()*14);

STATIONS.forEach((s,i)=>{
  const c=document.createElement('button');
  c.className='s-card'; c.dataset.idx=i;
  c.style.setProperty('--accent-color',s.accent);
  c.innerHTML=`<div class="s-logo-wrap"><img class="s-logo" src="${s.logo}" alt="${s.name}"></div><div class="s-body"><div class="s-freq">${s.freq}</div><div class="s-name">${s.name}</div></div><div class="s-right"><span class="s-chevron">&rarr;</span></div>`;
  c.addEventListener('click',()=>sel(i));
  cardList.appendChild(c);
});

let cur=-1,playing=false,usedFb=false,vuInt=null;

function sel(i){
  if(cur===i&&playing){stp();return;}
  cur=i;usedFb=false;
  const s=STATIONS[i];
  nowFreqEl.textContent=s.freq;nowNameEl.textContent=s.name;
  nowLogoEl.src=s.logo;nowLogoEl.classList.remove('hidden');
  document.querySelectorAll('.s-card').forEach((c,j)=>c.classList.toggle('active',j===i));
  play(s.stream);
}
function play(url){
  setS('buf','cargando…');
  aud.src=url;aud.volume=volEl.value/100;aud.load();
  aud.play().catch(()=>tryFb());
}
function tryFb(){
  if(!usedFb&&cur>=0){usedFb=true;play(STATIONS[cur].fallback);}
  else{setS('err','error de stream');playing=false;playBtn.textContent='▶';playBtn.classList.remove('playing');stopW();}
}
function stp(){
  aud.pause();aud.src='';playing=false;
  playBtn.textContent='▶';playBtn.classList.remove('playing');
  setS('off','en espera');stopW();
}
aud.addEventListener('playing',()=>{
  playing=true;playBtn.textContent='■';playBtn.classList.add('playing');
  setS('on','en vivo');startW();
  if('mediaSession' in navigator&&cur>=0){
    const s=STATIONS[cur];
    navigator.mediaSession.metadata=new MediaMetadata({title:s.name,artist:s.freq,album:'MiRadio'});
    navigator.mediaSession.playbackState='playing';
  }
});
aud.addEventListener('waiting',()=>{setS('buf','cargando…');stopW();});
aud.addEventListener('error',()=>tryFb());
aud.addEventListener('stalled',()=>setS('buf','reconectando…'));

playBtn.addEventListener('click',()=>{if(cur<0){sel(0);return;}if(playing)stp();else{usedFb=false;play(STATIONS[cur].stream);}});
prevBtn.addEventListener('click',()=>sel(cur<=0?STATIONS.length-1:cur-1));
nextBtn.addEventListener('click',()=>sel((cur+1)%STATIONS.length));
volEl.addEventListener('input',()=>{
  aud.volume=volEl.value/100;
  volEl.style.background=`linear-gradient(90deg,rgba(240,236,228,.6) ${volEl.value}%,rgba(255,255,255,.12) ${volEl.value}%)`;
});
volEl.style.background='linear-gradient(90deg,rgba(240,236,228,.6) 80%,rgba(255,255,255,.12) 80%)';

function setS(st,txt){
  dotEl.className='dot';
  if(st==='on')dotEl.classList.add('on');
  else if(st==='buf')dotEl.classList.add('buf');
  else if(st==='err')dotEl.classList.add('err');
  statusEl.textContent=txt;
}
function startW(){
  stopW();
  vuInt=setInterval(()=>{
    wBars.forEach((b,i)=>{const h=Math.max(2,Math.random()*wPeaks[i]);b.style.height=h+'px';b.classList.toggle('on',h>wPeaks[i]*.45);});
  },110);
}
function stopW(){clearInterval(vuInt);wBars.forEach(b=>{b.style.height='3px';b.classList.remove('on');});}

if('mediaSession' in navigator){
  navigator.mediaSession.setActionHandler('play',()=>{if(cur>=0)play(STATIONS[cur].stream);});
  navigator.mediaSession.setActionHandler('pause',()=>stp());
  navigator.mediaSession.setActionHandler('stop',()=>stp());
  navigator.mediaSession.setActionHandler('previoustrack',()=>sel(cur<=0?STATIONS.length-1:cur-1));
  navigator.mediaSession.setActionHandler('nexttrack',()=>sel((cur+1)%STATIONS.length));
}

window.addEventListener('online',()=>offlineBar.classList.remove('show'));
window.addEventListener('offline',()=>offlineBar.classList.add('show'));
if(!navigator.onLine)offlineBar.classList.add('show');

// PWA Install
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  if(!window.matchMedia('(display-mode: standalone)').matches&&!sessionStorage.getItem('installDismissed')){
    installBanner.classList.add('show');
  }
});
installBtn.addEventListener('click',async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt=null;
  installBanner.classList.remove('show');
});
dismissBtn.addEventListener('click',()=>{
  installBanner.classList.remove('show');
  sessionStorage.setItem('installDismissed','1');
});
window.addEventListener('appinstalled',()=>{installBanner.classList.remove('show');deferredPrompt=null;});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js',{updateViaCache:'none'})
    .then(r=>console.log('SW ok',r.scope))
    .catch(e=>console.warn('SW fail',e));
}
</script>
</body>
</html>
