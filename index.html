<title>MiRadio</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Figtree:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1923;--card:#18242f;--border:rgba(255,255,255,0.08);--text:#f0ece4;--muted:rgba(240,236,228,0.38);--green:#2ecc71;--amber:#e8920a;--red:#e74c3c;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);font-family:'Figtree',sans-serif;overflow:hidden;}
.shell{width:100%;height:100dvh;display:flex;flex-direction:column;
  padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0);}

.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px 6px;flex-shrink:0;}
.tb-left{display:flex;align-items:center;gap:10px;}
.app-logo-img{width:34px;height:34px;border-radius:50%;flex-shrink:0;}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;color:var(--text);
  letter-spacing:.06em;line-height:1;}
.now-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);
  border:1px solid var(--border);border-radius:20px;padding:4px 10px;
  max-width:52%;overflow:hidden;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;
  transition:background .3s,box-shadow .3s;}
.dot.on{background:var(--green);box-shadow:0 0 0 3px rgba(46,204,113,.2);animation:pulse 2s infinite;}
.dot.buf{background:var(--amber);animation:blink .5s infinite;}
.dot.err{background:var(--red);}
.pill-txt{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

#installBanner{display:none;margin:0 12px 6px;background:rgba(232,146,10,.1);
  border:1px solid rgba(232,146,10,.3);border-radius:10px;padding:8px 12px;
  align-items:center;gap:8px;flex-shrink:0;}
#installBanner.show{display:flex;}
.install-ico{font-size:1.2rem;flex-shrink:0;}
.install-txt{flex:1;}
.install-txt strong{display:block;font-size:.72rem;color:var(--text);}
.install-txt span{font-size:.58rem;color:var(--muted);}
.install-btn{background:rgba(232,146,10,.85);border:none;border-radius:6px;color:#0f1923;
  font-family:'Figtree',sans-serif;font-weight:600;font-size:.65rem;padding:6px 10px;cursor:pointer;}
.install-dismiss{background:none;border:none;color:var(--muted);font-size:.9rem;cursor:pointer;padding:0 2px;}

#offlineBar{display:none;margin:0 12px 6px;background:rgba(231,76,60,.12);
  border:1px solid rgba(231,76,60,.3);border-radius:8px;padding:6px 12px;flex-shrink:0;
  font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--red);text-align:center;}
#offlineBar.show{display:block;}

/* ── 2×2 GRID ── */
.grid{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;
  gap:10px;padding:4px 12px 8px;min-height:0;}

.tile{position:relative;border-radius:20px;border:2px solid var(--border);cursor:pointer;
  overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:border-color .2s,transform .12s;background:var(--card);}
.tile:active{transform:scale(.96);}
.tile.active{border-color:var(--accent-color);}

.tile-glow{position:absolute;inset:0;opacity:0;transition:opacity .4s;
  background:radial-gradient(ellipse at 50% 60%,var(--accent-color) 0%,transparent 70%);
  mix-blend-mode:screen;}
.tile.active .tile-glow{opacity:.14;}

/* logo ocupa ~78% del tile — sin recuadro ni borde extra */
.tile-logo-wrap{width:78%;max-width:180px;aspect-ratio:1;
  display:flex;align-items:center;justify-content:center;position:relative;z-index:1;}
.tile-logo{width:100%;height:100%;object-fit:contain;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));
  transition:filter .3s,transform .3s;}
.tile.active .tile-logo{
  filter:drop-shadow(0 0 18px var(--accent-color)) drop-shadow(0 4px 8px rgba(0,0,0,.6));
  transform:scale(1.05);}

.tile-freq{font-family:'Bebas Neue',sans-serif;font-size:.85rem;color:var(--muted);
  letter-spacing:.1em;margin-top:5px;position:relative;z-index:1;transition:color .3s;}
.tile.active .tile-freq{color:var(--accent-color);}

.tile-wave{display:flex;align-items:flex-end;gap:2px;height:10px;margin-top:4px;
  position:relative;z-index:1;opacity:0;transition:opacity .3s;}
.tile.active .tile-wave{opacity:1;}
.tw-bar{width:3px;border-radius:2px;background:var(--accent-color);height:3px;transition:height .08s;}

/* ── CONTROLS ── */
.controls{flex-shrink:0;display:flex;align-items:center;padding:6px 16px 8px;gap:8px;
  background:rgba(12,20,30,.9);border-top:1px solid var(--border);}
.btn-play{width:48px;height:48px;border-radius:50%;background:var(--text);color:var(--bg);
  border:none;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;}
.btn-play:active{transform:scale(.9);}
.btn-play.playing{background:var(--green);}
.btn-skip{background:none;border:none;cursor:pointer;color:var(--muted);font-size:.85rem;padding:8px;}
.btn-skip:active{color:var(--text);}
.vol-wrap{flex:1;display:flex;align-items:center;gap:8px;margin-left:4px;}
.vol-ico{font-size:.7rem;color:var(--muted);}
input[type=range]{flex:1;-webkit-appearance:none;height:3px;
  background:rgba(255,255,255,.12);border-radius:2px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;
  border-radius:50%;background:var(--text);cursor:grab;}

@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(46,204,113,.2)}50%{box-shadow:0 0 0 5px rgba(46,204,113,.07)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
</style>
</head>
<body>
<div class="shell">

const aud=document.getElementById('aud'),playBtn=document.getElementById('playBtn'),
  prevBtn=document.getElementById('prevBtn'),nextBtn=document.getElementById('nextBtn'),
  volEl=document.getElementById('vol'),dotEl=document.getElementById('dot'),
  pillTxt=document.getElementById('pillTxt'),grid=document.getElementById('grid'),
  offlineBar=document.getElementById('offlineBar'),
  installBanner=document.getElementById('installBanner'),
  installBtn=document.getElementById('installBtn'),
  dismissBtn=document.getElementById('dismissBtn');

const tiles=[],tileWaveBars=[];
STATIONS.forEach((s,i)=>{
  const tile=document.createElement('div');
  tile.className='tile';
  tile.style.setProperty('--accent-color',s.accent);
  const waveBars=Array.from({length:6},()=>{const b=document.createElement('div');b.className='tw-bar';return b;});
  tileWaveBars.push(waveBars);
  const waveEl=document.createElement('div');waveEl.className='tile-wave';
  waveBars.forEach(b=>waveEl.appendChild(b));
  tile.innerHTML=`<div class="tile-glow"></div>
    <div class="tile-logo-wrap"><img class="tile-logo" src="${s.logo}" alt="${s.name}"></div>
    <div class="tile-freq">${s.freq}</div>`;
  tile.appendChild(waveEl);
  tile.addEventListener('click',()=>sel(i));
  grid.appendChild(tile);tiles.push(tile);
});

let cur=-1,playing=false,usedStreamIdx=0,vuInt=null;
const wPeaks=[10,14,9,13,11,8];

function sel(i){
  if(cur===i&&playing){stp();return;}
  cur=i;usedStreamIdx=0;
  tiles.forEach((t,j)=>t.classList.toggle('active',j===i));
  playStream(STATIONS[i].streams[0]);
}
function playStream(url){
  setS('buf','cargando…');
  aud.pause();aud.removeAttribute('src');aud.load();
  setTimeout(()=>{
    aud.src=url;aud.volume=volEl.value/100;aud.load();
    const p=aud.play();if(p!==undefined)p.catch(()=>tryNextStream());
  },80);
}
function tryNextStream(){
  if(cur<0)return;const s=STATIONS[cur];usedStreamIdx++;
  if(usedStreamIdx<s.streams.length)playStream(s.streams[usedStreamIdx]);
  else{setS('err','error');playing=false;playBtn.textContent='▶';playBtn.classList.remove('playing');stopW();}
}
function stp(){
  aud.pause();aud.removeAttribute('src');aud.load();
  playing=false;playBtn.textContent='▶';playBtn.classList.remove('playing');
  setS('off','en espera');stopW();updateMS(false);
}
aud.addEventListener('playing',()=>{
  playing=true;playBtn.textContent='■';playBtn.classList.add('playing');
  setS('on',cur>=0?STATIONS[cur].name:'en vivo');startW();
  if(cur>=0)updateMS(true,STATIONS[cur]);
});
aud.addEventListener('waiting',()=>{setS('buf','cargando…');stopW();});
aud.addEventListener('stalled',()=>setS('buf','reconectando…'));
aud.addEventListener('error',()=>tryNextStream());

playBtn.addEventListener('click',()=>{if(cur<0){sel(0);return;}if(playing)stp();else{usedStreamIdx=0;playStream(STATIONS[cur].streams[0]);}});
prevBtn.addEventListener('click',()=>sel(cur<=0?STATIONS.length-1:cur-1));
nextBtn.addEventListener('click',()=>sel((cur+1)%STATIONS.length));
volEl.addEventListener('input',()=>{
  aud.volume=volEl.value/100;
  volEl.style.background=`linear-gradient(90deg,rgba(240,236,228,.6) ${volEl.value}%,rgba(255,255,255,.12) ${volEl.value}%)`;
});
volEl.style.background='linear-gradient(90deg,rgba(240,236,228,.6) 80%,rgba(255,255,255,.12) 80%)';

function setS(st,txt){
  dotEl.className='dot';
  if(st==='on')dotEl.classList.add('on');
  else if(st==='buf')dotEl.classList.add('buf');
  else if(st==='err')dotEl.classList.add('err');
  pillTxt.textContent=txt;
}
function startW(){
  stopW();if(cur<0)return;
  const bars=tileWaveBars[cur];
  vuInt=setInterval(()=>{bars.forEach((b,i)=>{b.style.height=Math.max(2,Math.random()*wPeaks[i])+'px';});},120);
}
function stopW(){clearInterval(vuInt);tileWaveBars.forEach(bars=>bars.forEach(b=>b.style.height='3px'));}

function updateMS(isPlaying,s){
  if(!('mediaSession' in navigator))return;
  if(isPlaying&&s){
    navigator.mediaSession.metadata=new MediaMetadata({
      title:s.name,artist:s.freq,album:'MiRadio',
      artwork:[{src:s.logo,sizes:'512x512',type:'image/png'}]
    });
    navigator.mediaSession.playbackState='playing';
  } else {
    navigator.mediaSession.playbackState='paused';
  }
}
if('mediaSession' in navigator){
  navigator.mediaSession.setActionHandler('play',()=>{if(cur>=0){usedStreamIdx=0;playStream(STATIONS[cur].streams[0]);}else sel(0);});
  navigator.mediaSession.setActionHandler('pause',()=>stp());
  navigator.mediaSession.setActionHandler('stop',()=>stp());
  navigator.mediaSession.setActionHandler('previoustrack',()=>sel(cur<=0?STATIONS.length-1:cur-1));
  navigator.mediaSession.setActionHandler('nexttrack',()=>sel((cur+1)%STATIONS.length));
  try{navigator.mediaSession.setActionHandler('seekto',null);}catch(e){}
  try{navigator.mediaSession.setActionHandler('seekforward',null);}catch(e){}
  try{navigator.mediaSession.setActionHandler('seekbackward',null);}catch(e){}
}

window.addEventListener('online',()=>offlineBar.classList.remove('show'));
window.addEventListener('offline',()=>offlineBar.classList.add('show'));
if(!navigator.onLine)offlineBar.classList.add('show');

let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  if(!window.matchMedia('(display-mode: standalone)').matches&&!sessionStorage.getItem('installDismissed'))
    installBanner.classList.add('show');
});
installBtn.addEventListener('click',async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();await deferredPrompt.userChoice;
  deferredPrompt=null;installBanner.classList.remove('show');
});
dismissBtn.addEventListener('click',()=>{installBanner.classList.remove('show');sessionStorage.setItem('installDismissed','1');});
window.addEventListener('appinstalled',()=>{installBanner.classList.remove('show');deferredPrompt=null;});

if('serviceWorker' in navigator)
  navigator.serviceWorker.register('./sw.js',{updateViaCache:'none'})
    .then(r=>console.log('SW ok',r.scope)).catch(e=>console.warn('SW fail',e));
</script>
</body>
</html>
